<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter Tight',sans-serif;background:#060a10;padding:0;-webkit-font-smoothing:antialiased;}
.strip{background:#0c1220;border-bottom:1px solid #1a2540;padding:20px 28px;display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:12px;}
.brand img{height:36px;}
.wordmark{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.08em;color:#e0ecff;}
.wordmark .light{color:#304060;margin-left:6px;}
.rule{height:2px;background:oklch(70% 0.22 220);}
.body{padding:24px 28px;background:#060a10;}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:oklch(70% 0.22 220);}
h2{font-size:26px;font-weight:700;color:#e0ecff;margin:6px 0 4px;letter-spacing:-0.02em;}
.sub{font-size:13px;color:#6080a0;}
.badge{font-family:'JetBrains Mono',monospace;background:oklch(70% 0.22 220);color:#060a10;font-size:10px;font-weight:600;padding:5px 12px;border-radius:0;letter-spacing:0.08em;}
</style></head><body>
<div class="strip">
  <div class="brand">
    <img src="../assets/logos/kordas_kmark.svg" alt="Kordas Technologies">
    <span class="wordmark">KORDAS<span class="light">TECHNOLOGIES</span></span>
  </div>
  <span class="badge">OFERTA CENOWA</span>
</div>
<div class="rule"></div>
<div class="body">
  <span class="eyebrow">AI · RAPID PROTOTYPING · IoT</span>
  <h2>Smart, driven, cross-stack innovation.</h2>
  <span class="sub">Wzorzec nagłówka dokumentu — dark strip, 2px cyan rule, eyebrow, h2.</span>
</div>
</body></html>
