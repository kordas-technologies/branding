<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter Tight',sans-serif;background:#060a10;padding:24px;-webkit-font-smoothing:antialiased;}
.block{margin-bottom:18px;}
.block:last-child{margin-bottom:0;}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:#304060;margin-bottom:8px;}
.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.b{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:4px 10px;border-radius:0;letter-spacing:0.06em;}
.b-pill{border-radius:999px;padding:4px 12px;}
.tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;padding:4px 10px;border-radius:0;background:#101828;color:#e0ecff;border:1px solid #1a2540;}
</style></head><body>
<div class="block">
  <div class="lbl">Status pills — docs / emails</div>
  <div class="row">
    <span class="b b-pill" style="background:oklch(70% 0.22 220);color:#060a10;">OFERTA CENOWA</span>
    <span class="b b-pill" style="background:#0c1220;color:#e0ecff;border:1px solid #1a2540;">RAPORT</span>
    <span class="b b-pill" style="background:#101828;color:oklch(88% 0.08 220);border:1px solid #1a2540;">PROPOZYCJA</span>
    <span class="b b-pill" style="background:#101828;color:#e0ecff;border:1px solid #1a2540;">FAKTURA</span>
  </div>
</div>
<div class="block">
  <div class="lbl">Semantic state badges</div>
  <div class="row">
    <span class="b" style="background:oklch(68% 0.18 145);color:#060a10;">Aktywne</span>
    <span class="b" style="background:oklch(72% 0.17 75);color:#060a10;">W trakcie</span>
    <span class="b" style="background:oklch(62% 0.20 25);color:#e0ecff;">Wstrzymane</span>
    <span class="b" style="background:oklch(70% 0.22 220);color:#060a10;">Nowe</span>
    <span class="b" style="background:#101828;color:#6080a0;border:1px solid #1a2540;">Archiwum</span>
  </div>
</div>
<div class="block">
  <div class="lbl">Tech tags</div>
  <div class="row">
    <span class="tag">YOLOv8</span><span class="tag">Raspberry Pi 5</span><span class="tag">TFLite / int8</span><span class="tag">REST + gRPC</span><span class="tag">MQTT</span><span class="tag">OpenAPI</span>
  </div>
</div>
<div class="block">
  <div class="lbl">Counter bubbles</div>
  <div class="row">
    <span class="b" style="background:oklch(70% 0.22 220);color:#060a10;border-radius:999px;min-width:22px;text-align:center;font-size:10px;padding:3px 7px;">12</span>
    <span class="b" style="background:oklch(62% 0.20 25);color:#e0ecff;border-radius:999px;min-width:22px;text-align:center;font-size:10px;padding:3px 7px;">3</span>
    <span class="b" style="background:#1a2540;color:#6080a0;border-radius:999px;min-width:22px;text-align:center;font-size:10px;padding:3px 7px;">99+</span>
  </div>
</div>
</body></html>
