<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter Tight',sans-serif;background:#060a10;padding:24px;-webkit-font-smoothing:antialiased;color:#e0ecff;}
.row{display:flex;align-items:baseline;gap:20px;padding:10px 0;border-bottom:1px solid #1a2540;}
.row:last-child{border-bottom:0;}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#304060;min-width:80px;flex-shrink:0;}
.divider{display:inline-block;width:1.2px;height:28px;background:#1a2540;margin:0 14px;vertical-align:middle;}
</style></head><body>
<div class="row"><span class="lbl">300 Light</span><span style="font-size:28px;font-weight:300;color:#304060;">TECHNOLOGIES · light weight</span></div>
<div class="row"><span class="lbl">400 Regular</span><span style="font-size:18px;font-weight:400;color:#6080a0;">Body copy is set in Regular — the workhorse of the system.</span></div>
<div class="row"><span class="lbl">500 Medium</span><span style="font-size:18px;font-weight:500;color:#e0ecff;">Medium emphasizes UI labels, stat values, captions.</span></div>
<div class="row"><span class="lbl">600 Semibold</span><span style="font-size:28px;font-weight:600;color:#e0ecff;">KORDAS · semibold anchors</span></div>
<div class="row"><span class="lbl">700 Bold</span><span style="font-size:22px;font-weight:700;color:#e0ecff;">73 800 zł brutto · milestone prices</span></div>
<div class="row" style="padding-top:20px;">
  <span class="lbl">Signature</span>
  <span style="font-size:34px;font-weight:600;color:#e0ecff;letter-spacing:-0.005em;">KORDAS</span>
  <span class="divider"></span>
  <span style="font-size:34px;font-weight:300;color:#304060;letter-spacing:-0.005em;">TECHNOLOGIES</span>
</div>
</body></html>
