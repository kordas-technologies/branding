<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter Tight',sans-serif;background:#060a10;padding:20px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;}
.cell{flex:1;border-radius:0;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;text-align:center;}
</style></head><body>
<div class="row">
  <div class="cell" style="background:#0c1220;border:1px solid #1a2540;">
    <img src="../assets/logos/kordas_icon.svg" style="width:72px;height:72px;" alt="">
    <span class="lbl" style="color:#6080a0;">Dark surface · SVG</span>
  </div>
  <div class="cell" style="background:#060a10;border:1px solid #1a2540;">
    <img src="../assets/logos/kordas_icon.png" style="width:72px;height:72px;" alt="">
    <span class="lbl" style="color:#304060;">Canvas · PNG</span>
  </div>
  <div class="cell" style="background:#101828;border:1px solid #1a2540;">
    <div style="width:72px;height:72px;background:#0c1220;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #1a2540;">
      <img src="../assets/logos/kordas_icon.svg" style="width:44px;height:44px;" alt="">
    </div>
    <span class="lbl" style="color:#6080a0;">Avatar · circle</span>
  </div>
  <div class="cell" style="background:#0c1220;border:1px solid #1a2540;justify-content:center;">
    <img src="../assets/logos/kordas_icon.svg" style="width:24px;height:24px;" alt="">
    <span class="lbl" style="color:#304060;">Favicon · 24px</span>
    <img src="../assets/logos/kordas_icon.svg" style="width:16px;height:16px;" alt="">
    <span class="lbl" style="color:#304060;">16px min</span>
  </div>
</div>
</body></html>
