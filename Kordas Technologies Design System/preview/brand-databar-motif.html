<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter Tight',sans-serif;background:#060a10;padding:20px;-webkit-font-smoothing:antialiased;}
.panel{background:#0c1220;border:1px solid #1a2540;border-radius:0;padding:28px 32px;display:flex;align-items:flex-end;gap:20px;}
.grp{display:flex;gap:6px;align-items:flex-end;}
.bar{width:8px;border-radius:4px;}
.legend{display:flex;gap:20px;margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#304060;}
.dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;}
.cap{font-family:'JetBrains Mono',monospace;font-size:11px;color:#304060;margin-top:8px;line-height:1.4;}
</style></head><body>
<div class="panel">
  <div class="grp">
    <span class="bar" style="background:oklch(70% 0.22 220);height:80px;"></span>
    <span class="bar" style="background:oklch(60% 0.22 220);height:58px;"></span>
    <span class="bar" style="background:oklch(88% 0.08 220);height:38px;"></span>
  </div>
  <div class="grp">
    <span class="bar" style="background:oklch(70% 0.22 220);height:64px;"></span>
    <span class="bar" style="background:oklch(60% 0.22 220);height:46px;"></span>
    <span class="bar" style="background:oklch(88% 0.08 220);height:28px;"></span>
  </div>
  <div class="grp">
    <span class="bar" style="background:oklch(70% 0.22 220);height:100px;"></span>
    <span class="bar" style="background:oklch(60% 0.22 220);height:74px;"></span>
    <span class="bar" style="background:oklch(88% 0.08 220);height:50px;"></span>
  </div>
  <div class="grp">
    <span class="bar" style="background:oklch(70% 0.22 220);height:56px;"></span>
    <span class="bar" style="background:oklch(60% 0.22 220);height:40px;"></span>
    <span class="bar" style="background:oklch(88% 0.08 220);height:24px;"></span>
  </div>
  <div class="grp">
    <span class="bar" style="background:oklch(70% 0.22 220);height:88px;"></span>
    <span class="bar" style="background:oklch(60% 0.22 220);height:64px;"></span>
    <span class="bar" style="background:oklch(88% 0.08 220);height:42px;"></span>
  </div>
</div>
<div class="legend">
  <span><span class="dot" style="background:oklch(70% 0.22 220);"></span>Tier 1 — cyan</span>
  <span><span class="dot" style="background:oklch(60% 0.22 220);"></span>Tier 2 — cyan-mid</span>
  <span><span class="dot" style="background:oklch(88% 0.08 220);"></span>Tier 3 — ice</span>
</div>
<div class="cap">// Abstrakcja z ikony K — pionowe pill-bary w 3-stopniowym rampie AXIOM. Używać oszczędnie, wyłącznie na ciemnych tłach.</div>
</body></html>
