<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter Tight',sans-serif;background:#060a10;padding:24px;-webkit-font-smoothing:antialiased;}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-weight:500;border:1px solid transparent;cursor:pointer;transition:all 120ms ease;border-radius:0;}
.sm{font-size:12px;padding:6px 12px;}
.md{font-size:14px;padding:10px 18px;}
.lg{font-size:16px;padding:14px 24px;}
.primary{background:oklch(70% 0.22 220);color:#060a10;box-shadow:0 6px 20px rgba(0,200,255,0.18);}
.secondary{background:transparent;color:#e0ecff;border-color:#1a2540;}
.ghost{background:transparent;color:oklch(70% 0.22 220);}
.dark{background:#0c1220;color:#e0ecff;border-color:#1a2540;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.row:last-child{margin-bottom:0;}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#304060;min-width:68px;}
</style></head><body>
<div class="row"><span class="lbl">Primary</span>
  <button class="btn sm primary">Pobierz ofertę</button>
  <button class="btn md primary">Skontaktuj się</button>
  <button class="btn lg primary">Umów rozmowę →</button>
</div>
<div class="row"><span class="lbl">Secondary</span>
  <button class="btn sm secondary">Anuluj</button>
  <button class="btn md secondary">Zobacz przykład</button>
  <button class="btn lg secondary">Pełna specyfikacja</button>
</div>
<div class="row"><span class="lbl">Ghost</span>
  <button class="btn sm ghost">Czytaj dalej</button>
  <button class="btn md ghost">Dowiedz się więcej</button>
</div>
<div class="row"><span class="lbl">Surface</span>
  <button class="btn md dark">Pobierz PDF</button>
  <button class="btn lg dark">Zarezerwuj termin</button>
</div>
</body></html>
