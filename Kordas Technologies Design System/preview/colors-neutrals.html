<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter Tight',sans-serif;background:#060a10;padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:6px;}
.sw{flex:1;height:100px;border-radius:0;border:1px solid #1a2540;padding:8px;display:flex;flex-direction:column;justify-content:space-between;}
.n{font-size:11px;font-weight:600;}
.h{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:0.75;}
.section-tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:oklch(70% 0.22 220);letter-spacing:.06em;display:block;margin-bottom:12px;}
</style></head><body>
<span class="section-tag">// colors · neutrals · AXIOM navy ramp</span>
<div class="row">
  <div class="sw" style="background:#060a10;color:#e0ecff;"><span class="n">BG</span><span class="h">060a10</span></div>
  <div class="sw" style="background:#0c1220;color:#e0ecff;"><span class="n">Elev</span><span class="h">0c1220</span></div>
  <div class="sw" style="background:#101828;color:#e0ecff;"><span class="n">Tint</span><span class="h">101828</span></div>
  <div class="sw" style="background:#1a2540;color:#e0ecff;"><span class="n">Border</span><span class="h">1a2540</span></div>
  <div class="sw" style="background:#304060;color:#e0ecff;"><span class="n">Muted</span><span class="h">304060</span></div>
  <div class="sw" style="background:#6080a0;color:#e0ecff;"><span class="n">Sub</span><span class="h">6080a0</span></div>
  <div class="sw" style="background:#e0ecff;color:#060a10;"><span class="n">FG-1</span><span class="h">e0ecff</span></div>
</div>
</body></html>
