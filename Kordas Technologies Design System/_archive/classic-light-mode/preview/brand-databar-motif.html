<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#f1f5f9;padding:20px;-webkit-font-smoothing:antialiased;}
.panel{background:#0f172a;border-radius:8px;padding:28px 32px;display:flex;align-items:flex-end;gap:20px;}
.grp{display:flex;gap:6px;align-items:flex-end;}
.bar{width:8px;border-radius:4px;}
.legend{display:flex;gap:20px;margin-top:12px;font-size:11px;color:#64748b;}
.dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;}
.cap{font-size:11px;color:#64748b;margin-top:8px;line-height:1.4;}
</style></head><body>
<div class="panel">
  <div class="grp">
    <span class="bar" style="background:#3b82f6;height:80px;"></span>
    <span class="bar" style="background:#60a5fa;height:58px;"></span>
    <span class="bar" style="background:#bfdbfe;height:38px;"></span>
  </div>
  <div class="grp">
    <span class="bar" style="background:#3b82f6;height:64px;"></span>
    <span class="bar" style="background:#60a5fa;height:46px;"></span>
    <span class="bar" style="background:#bfdbfe;height:28px;"></span>
  </div>
  <div class="grp">
    <span class="bar" style="background:#3b82f6;height:100px;"></span>
    <span class="bar" style="background:#60a5fa;height:74px;"></span>
    <span class="bar" style="background:#bfdbfe;height:50px;"></span>
  </div>
  <div class="grp">
    <span class="bar" style="background:#3b82f6;height:56px;"></span>
    <span class="bar" style="background:#60a5fa;height:40px;"></span>
    <span class="bar" style="background:#bfdbfe;height:24px;"></span>
  </div>
  <div class="grp">
    <span class="bar" style="background:#3b82f6;height:88px;"></span>
    <span class="bar" style="background:#60a5fa;height:64px;"></span>
    <span class="bar" style="background:#bfdbfe;height:42px;"></span>
  </div>
</div>
<div class="legend">
  <span><span class="dot" style="background:#3b82f6;"></span>Tier 1 — #3b82f6</span>
  <span><span class="dot" style="background:#60a5fa;"></span>Tier 2 — #60a5fa</span>
  <span><span class="dot" style="background:#bfdbfe;"></span>Tier 3 — #bfdbfe</span>
</div>
<div class="cap">Abstrakcja z ikony K — pionowe pill-bary w 3-stopniowym rampie niebieskim. Używać oszczędnie, wyłącznie na ciemnych tłach.</div>
</body></html>
