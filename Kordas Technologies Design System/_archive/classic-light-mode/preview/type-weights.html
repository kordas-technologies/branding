<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,'Helvetica Neue',Arial,sans-serif;background:#fff;padding:24px;-webkit-font-smoothing:antialiased;color:#0f172a;}
.row{display:flex;align-items:baseline;gap:20px;padding:10px 0;border-bottom:1px solid #f1f5f9;}
.row:last-child{border-bottom:0;}
.lbl{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#94a3b8;min-width:80px;flex-shrink:0;}
.divider{display:inline-block;width:1.2px;height:28px;background:#cbd5e1;margin:0 14px;vertical-align:middle;}
</style></head><body>
<div class="row"><span class="lbl">300 Light</span><span style="font-size:28px;font-weight:300;color:#94a3b8;">TECHNOLOGIES · light weight</span></div>
<div class="row"><span class="lbl">400 Regular</span><span style="font-size:18px;font-weight:400;color:#475569;">Body copy is set in Regular — the workhorse of the system.</span></div>
<div class="row"><span class="lbl">500 Medium</span><span style="font-size:18px;font-weight:500;color:#0f172a;">Medium emphasizes UI labels, stat values, captions.</span></div>
<div class="row"><span class="lbl">600 Semibold</span><span style="font-size:28px;font-weight:600;color:#0f172a;">KORDAS · semibold anchors</span></div>
<div class="row"><span class="lbl">700 Bold</span><span style="font-size:22px;font-weight:700;color:#0f172a;">73 800 zł brutto · milestone prices</span></div>
<div class="row" style="padding-top:20px;">
  <span class="lbl">Signature pairing</span>
  <span style="font-size:34px;font-weight:600;color:#0f172a;letter-spacing:-0.005em;">KORDAS</span>
  <span class="divider"></span>
  <span style="font-size:34px;font-weight:300;color:#64748b;letter-spacing:-0.005em;">TECHNOLOGIES</span>
</div>
</body></html>
