<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#f8fafc;padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:6px;}
.sw{flex:1;height:100px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);padding:8px;display:flex;flex-direction:column;justify-content:space-between;}
.n{font-size:11px;font-weight:600;}
.h{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:0.75;}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#f8fafc;color:#334155;"><span class="n">50</span><span class="h">f8fafc</span></div>
  <div class="sw" style="background:#f1f5f9;color:#334155;border:1px solid #e2e8f0;"><span class="n">100</span><span class="h">f1f5f9</span></div>
  <div class="sw" style="background:#e2e8f0;color:#334155;"><span class="n">200</span><span class="h">e2e8f0</span></div>
  <div class="sw" style="background:#cbd5e1;color:#1e293b;"><span class="n">300</span><span class="h">cbd5e1</span></div>
  <div class="sw" style="background:#94a3b8;color:#fff;"><span class="n">400</span><span class="h">94a3b8</span></div>
  <div class="sw" style="background:#64748b;color:#fff;"><span class="n">500</span><span class="h">64748b</span></div>
  <div class="sw" style="background:#475569;color:#fff;"><span class="n">600</span><span class="h">475569</span></div>
  <div class="sw" style="background:#334155;color:#fff;"><span class="n">700</span><span class="h">334155</span></div>
  <div class="sw" style="background:#1e293b;color:#fff;"><span class="n">800</span><span class="h">1e293b</span></div>
  <div class="sw" style="background:#0f172a;color:#fff;"><span class="n">900</span><span class="h">0f172a</span></div>
</div>
</body></html>
