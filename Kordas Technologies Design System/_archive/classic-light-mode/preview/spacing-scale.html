<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#fff;padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.name{font-size:11px;font-weight:600;color:#0f172a;width:44px;flex-shrink:0;}
.px{font-family:'JetBrains Mono',monospace;font-size:10px;color:#64748b;width:36px;flex-shrink:0;}
.bar{height:12px;border-radius:2px;background:#3b82f6;}
</style></head><body>
<div class="row"><span class="name">s-1</span><span class="px">4px</span><div class="bar" style="width:4px;"></div></div>
<div class="row"><span class="name">s-2</span><span class="px">8px</span><div class="bar" style="width:8px;"></div></div>
<div class="row"><span class="name">s-3</span><span class="px">12px</span><div class="bar" style="width:12px;"></div></div>
<div class="row"><span class="name">s-4</span><span class="px">16px</span><div class="bar" style="width:16px;"></div></div>
<div class="row"><span class="name">s-5</span><span class="px">20px</span><div class="bar" style="width:20px;"></div></div>
<div class="row"><span class="name">s-6</span><span class="px">24px</span><div class="bar" style="width:24px;"></div></div>
<div class="row"><span class="name">s-8</span><span class="px">32px</span><div class="bar" style="width:32px;"></div></div>
<div class="row"><span class="name">s-10</span><span class="px">40px</span><div class="bar" style="width:40px;"></div></div>
<div class="row"><span class="name">s-12</span><span class="px">48px</span><div class="bar" style="width:48px;"></div></div>
<div class="row"><span class="name">s-16</span><span class="px">64px</span><div class="bar" style="width:64px;"></div></div>
<div class="row"><span class="name">s-20</span><span class="px">80px</span><div class="bar" style="width:80px;"></div></div>
<div class="row"><span class="name">s-24</span><span class="px">96px</span><div class="bar" style="width:96px;"></div></div>
</body></html>
