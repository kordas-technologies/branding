<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#f1f5f9;padding:32px 24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:20px;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;align-items:center;gap:12px;}
.box{width:110px;height:80px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:#475569;}
.name{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#64748b;}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:0 1px 2px rgba(15,23,42,0.05);">xs</div><span class="name">xs</span></div>
  <div class="col"><div class="box" style="box-shadow:0 1px 3px rgba(15,23,42,0.08),0 1px 2px rgba(15,23,42,0.04);">sm</div><span class="name">sm</span></div>
  <div class="col"><div class="box" style="box-shadow:0 4px 12px rgba(15,23,42,0.08),0 2px 4px rgba(15,23,42,0.04);">md</div><span class="name">md</span></div>
  <div class="col"><div class="box" style="box-shadow:0 10px 30px rgba(15,23,42,0.10),0 4px 8px rgba(15,23,42,0.04);">lg</div><span class="name">lg</span></div>
  <div class="col"><div class="box" style="box-shadow:0 20px 50px rgba(15,23,42,0.12),0 8px 16px rgba(15,23,42,0.06);">xl</div><span class="name">xl</span></div>
  <div class="col"><div class="box" style="background:#3b82f6;color:#fff;box-shadow:0 6px 20px rgba(59,130,246,0.35);">blue</div><span class="name">blue CTA</span></div>
</div>
</body></html>
