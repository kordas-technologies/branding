<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#f1f5f9;padding:20px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;}
.cell{flex:1;border-radius:8px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.lbl{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;text-align:center;}
</style></head><body>
<div class="row">
  <div class="cell" style="background:#fff;border:1px solid #e2e8f0;">
    <img src="../assets/logos/kordas_icon.svg" style="width:72px;height:72px;" alt="">
    <span class="lbl" style="color:#64748b;">Light · SVG</span>
  </div>
  <div class="cell" style="background:#0f172a;">
    <img src="../assets/logos/kordas_icon.png" style="width:72px;height:72px;" alt="">
    <span class="lbl" style="color:#94a3b8;">Dark · PNG</span>
  </div>
  <div class="cell" style="background:#3b82f6;">
    <div style="width:72px;height:72px;background:#0f172a;border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <img src="../assets/logos/kordas_icon.svg" style="width:44px;height:44px;" alt="">
    </div>
    <span class="lbl" style="color:#dbeafe;">Avatar · circle</span>
  </div>
  <div class="cell" style="background:#fff;border:1px solid #e2e8f0;justify-content:center;">
    <img src="../assets/logos/kordas_icon.svg" style="width:24px;height:24px;" alt="">
    <span class="lbl" style="color:#64748b;">Favicon · 24px</span>
    <img src="../assets/logos/kordas_icon.svg" style="width:16px;height:16px;" alt="">
    <span class="lbl" style="color:#64748b;">16px min</span>
  </div>
</div>
</body></html>
