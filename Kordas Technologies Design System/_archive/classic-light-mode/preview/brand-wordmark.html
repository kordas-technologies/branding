<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#f1f5f9;padding:20px;-webkit-font-smoothing:antialiased;}
.col{display:flex;flex-direction:column;gap:12px;}
.box{border-radius:8px;padding:32px;display:flex;align-items:center;justify-content:center;}
.lbl{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:#94a3b8;text-align:center;margin-top:4px;}
</style></head><body>
<div class="col">
  <div>
    <div class="box" style="background:#fff;border:1px solid #e2e8f0;">
      <img src="../assets/logos/kordas_logo.svg" style="height:64px;max-width:100%;" alt="Kordas Technologies — light bg">
    </div>
    <div class="lbl">Primary · light background · SVG</div>
  </div>
  <div>
    <div class="box" style="background:#0f172a;">
      <img src="../assets/logos/kordas_logo_light.png" style="height:64px;max-width:100%;" alt="Kordas Technologies — dark bg">
    </div>
    <div class="lbl">Dark background · PNG</div>
  </div>
</div>
</body></html>
