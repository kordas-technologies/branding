<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#f8fafc;padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;}
.pair{flex:1;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;}
.top{padding:16px 14px;font-size:13px;font-weight:600;color:#fff;}
.top .hex{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:400;opacity:0.85;display:block;margin-top:2px;}
.bot{padding:10px 14px;font-size:11px;font-weight:500;}
</style></head><body>
<div class="row">
  <div class="pair">
    <div class="top" style="background:#16a34a;">Success<span class="hex">#16a34a</span></div>
    <div class="bot" style="background:#dcfce7;color:#166534;">Bg #dcfce7</div>
  </div>
  <div class="pair">
    <div class="top" style="background:#f59e0b;">Warning<span class="hex">#f59e0b</span></div>
    <div class="bot" style="background:#fef3c7;color:#92400e;">Bg #fef3c7</div>
  </div>
  <div class="pair">
    <div class="top" style="background:#dc2626;">Danger<span class="hex">#dc2626</span></div>
    <div class="bot" style="background:#fee2e2;color:#991b1b;">Bg #fee2e2</div>
  </div>
  <div class="pair">
    <div class="top" style="background:#3b82f6;">Info<span class="hex">#3b82f6</span></div>
    <div class="bot" style="background:#dbeafe;color:#1e40af;">Bg #dbeafe</div>
  </div>
</div>
</body></html>
