<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,'Helvetica Neue',Arial,sans-serif;background:#f8fafc;padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:10px;flex-wrap:nowrap;}
.swatch{flex:1;height:140px;border-radius:8px;border:1px solid rgba(0,0,0,0.08);padding:14px 12px;display:flex;flex-direction:column;justify-content:space-between;}
.name{font-size:13px;font-weight:600;}
.hex{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace;font-size:11px;opacity:0.8;}
.tk{font-size:10px;opacity:0.65;margin-top:2px;}
</style></head><body>
<div class="row">
  <div class="swatch" style="background:#0f172a;color:#f1f5f9;">
    <span class="name">Navy</span>
    <div><span class="hex">#0f172a</span><div class="tk">--kt-navy · primary text</div></div>
  </div>
  <div class="swatch" style="background:#3b82f6;color:#fff;">
    <span class="name">Blue</span>
    <div><span class="hex">#3b82f6</span><div class="tk">--kt-blue · accent / CTAs</div></div>
  </div>
  <div class="swatch" style="background:#60a5fa;color:#fff;">
    <span class="name">Blue Light</span>
    <div><span class="hex">#60a5fa</span><div class="tk">--kt-blue-light · tier 2</div></div>
  </div>
  <div class="swatch" style="background:#bfdbfe;color:#0f172a;">
    <span class="name">Blue Pale</span>
    <div><span class="hex">#bfdbfe</span><div class="tk">--kt-blue-pale · tier 3</div></div>
  </div>
  <div class="swatch" style="background:#dbeafe;color:#0f172a;">
    <span class="name">Blue Faint</span>
    <div><span class="hex">#dbeafe</span><div class="tk">--kt-blue-faint · bg wash</div></div>
  </div>
  <div class="swatch" style="background:#2563eb;color:#fff;">
    <span class="name">Blue Deep</span>
    <div><span class="hex">#2563eb</span><div class="tk">--kt-blue-deep · hover</div></div>
  </div>
</div>
</body></html>
