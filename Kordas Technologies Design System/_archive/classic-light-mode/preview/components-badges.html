<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#fff;padding:24px;-webkit-font-smoothing:antialiased;}
.block{margin-bottom:18px;}
.block:last-child{margin-bottom:0;}
.lbl{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:#94a3b8;margin-bottom:8px;}
.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.b{display:inline-block;font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;letter-spacing:0.06em;}
.b-pill{border-radius:999px;padding:4px 12px;}
.tag{display:inline-block;font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;background:#f1f5f9;color:#334155;border:1px solid #e2e8f0;}
</style></head><body>
<div class="block">
  <div class="lbl">Status pills — docs / emails</div>
  <div class="row">
    <span class="b b-pill" style="background:#3b82f6;color:#fff;">OFERTA CENOWA</span>
    <span class="b b-pill" style="background:#0f172a;color:#fff;">RAPORT</span>
    <span class="b b-pill" style="background:#dbeafe;color:#1e40af;">PROPOZYCJA</span>
    <span class="b b-pill" style="background:#1e293b;color:#fff;">FAKTURA</span>
  </div>
</div>
<div class="block">
  <div class="lbl">Semantic state badges</div>
  <div class="row">
    <span class="b" style="background:#dcfce7;color:#166534;">Aktywne</span>
    <span class="b" style="background:#fef3c7;color:#92400e;">W trakcie</span>
    <span class="b" style="background:#fee2e2;color:#991b1b;">Wstrzymane</span>
    <span class="b" style="background:#dbeafe;color:#1e40af;">Nowe</span>
    <span class="b" style="background:#f1f5f9;color:#475569;">Archiwum</span>
  </div>
</div>
<div class="block">
  <div class="lbl">Tech tags</div>
  <div class="row">
    <span class="tag">YOLOv8</span><span class="tag">Raspberry Pi 5</span><span class="tag">TFLite / int8</span><span class="tag">REST + gRPC</span><span class="tag">MQTT</span><span class="tag">OpenAPI</span>
  </div>
</div>
<div class="block">
  <div class="lbl">Counter bubbles</div>
  <div class="row">
    <span class="b" style="background:#3b82f6;color:#fff;border-radius:999px;min-width:22px;text-align:center;font-size:10px;padding:3px 7px;">12</span>
    <span class="b" style="background:#dc2626;color:#fff;border-radius:999px;min-width:22px;text-align:center;font-size:10px;padding:3px 7px;">3</span>
    <span class="b" style="background:#e2e8f0;color:#475569;border-radius:999px;min-width:22px;text-align:center;font-size:10px;padding:3px 7px;">99+</span>
  </div>
</div>
</body></html>
