<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#f1f5f9;padding:0;-webkit-font-smoothing:antialiased;}
.strip{background:#0f172a;padding:20px 28px;display:flex;justify-content:space-between;align-items:center;}
.rule{height:3px;background:#3b82f6;}
.body{padding:24px 28px;background:#fff;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#3b82f6;}
h2{font-size:26px;font-weight:600;color:#0f172a;margin:6px 0 4px;letter-spacing:-0.01em;}
.sub{font-size:13px;color:#64748b;}
.badge{background:#3b82f6;color:#fff;font-size:10px;font-weight:600;padding:5px 12px;border-radius:4px;letter-spacing:0.08em;}
</style></head><body>
<div class="strip">
  <img src="../assets/logos/kordas_logo_light.png" style="height:40px;" alt="Kordas Technologies">
  <span class="badge">OFERTA CENOWA</span>
</div>
<div class="rule"></div>
<div class="body">
  <span class="eyebrow">AI · RAPID PROTOTYPING · IoT</span>
  <h2>Smart, driven, cross-stack innovation.</h2>
  <span class="sub">Wzorzec nagłówka dokumentu — navy strip, 3px blue rule, eyebrow, h2.</span>
</div>
</body></html>
