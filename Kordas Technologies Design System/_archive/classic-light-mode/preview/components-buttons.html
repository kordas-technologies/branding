<!doctype html><html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Inter,Roboto,Arial,sans-serif;background:#fff;padding:24px;-webkit-font-smoothing:antialiased;}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-weight:500;border:1px solid transparent;cursor:pointer;transition:all 120ms ease;}
.sm{font-size:12px;padding:6px 12px;border-radius:4px;}
.md{font-size:14px;padding:10px 18px;border-radius:4px;}
.lg{font-size:16px;padding:14px 24px;border-radius:4px;}
.primary{background:#3b82f6;color:#fff;box-shadow:0 6px 20px rgba(59,130,246,0.25);}
.secondary{background:#fff;color:#0f172a;border-color:#cbd5e1;}
.ghost{background:transparent;color:#3b82f6;}
.dark{background:#0f172a;color:#fff;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.row:last-child{margin-bottom:0;}
.lbl{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#94a3b8;min-width:68px;}
</style></head><body>
<div class="row"><span class="lbl">Primary</span>
  <button class="btn sm primary">Pobierz ofertę</button>
  <button class="btn md primary">Skontaktuj się</button>
  <button class="btn lg primary">Umów rozmowę →</button>
</div>
<div class="row"><span class="lbl">Secondary</span>
  <button class="btn sm secondary">Anuluj</button>
  <button class="btn md secondary">Zobacz przykład</button>
  <button class="btn lg secondary">Pełna specyfikacja</button>
</div>
<div class="row"><span class="lbl">Ghost</span>
  <button class="btn sm ghost">Czytaj dalej</button>
  <button class="btn md ghost">Dowiedz się więcej</button>
</div>
<div class="row"><span class="lbl">Dark</span>
  <button class="btn md dark">Pobierz PDF</button>
  <button class="btn lg dark">Zarezerwuj termin</button>
</div>
</body></html>
